<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>页面已就绪</title>
    <style>
        /* 极简重置，确保移动端无额外边距 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            padding: 1rem;
        }
        /* 移动端触摸优化 */
        .message {
            text-align: center;
            font-size: 1.2rem;
            opacity: 0.8;
        }
        /* 深色模式跟随系统（可选，不必须） */
        @media (prefers-color-scheme: dark) {
            body {
                background: #0f172a;
                color: #e2e8f0;
            }
        }
    </style>
</head>
<body>
    <div class="message">
        ✨ 网站运行正常 ✨<br>
        <span style="font-size: 0.85rem; opacity: 0.6;">Site is ready</span>
    </div>
</body>
</html>
